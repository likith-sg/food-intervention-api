<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodGuard - Smart Food Intervention</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="animate-fade-in">
    <a href="/" class="logo">🥗 Food<span>Guard</span></a>
    <div>
      <a href="/auth" class="btn btn-secondary">Sign In</a>
      <a href="/auth" class="btn btn-primary" style="margin-left: 0.5rem;">Get Started</a>
    </div>
  </nav>

  <main style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 5rem 5%;">
    <div style="flex: 1; max-width: 600px;" class="animate-fade-in">
      <h1 style="font-size: 3.5rem; font-weight: 800; line-height: 1.1; margin-bottom: 1.5rem; color: var(--text);">
        Master Your Diet with <span style="color: var(--blue);">AI-Powered</span> Intervention
      </h1>
      <p style="font-size: 1.25rem; color: var(--text-secondary); margin-bottom: 2rem; line-height: 1.6;">
        FoodGuard analyzes what you're about to eat and provides real-time coaching to help you build healthier habits. Stop mindless eating before it starts.
      </p>
      <div style="display: flex; gap: 1rem;">
        <a href="/auth" class="btn btn-primary" style="font-size: 1.125rem; padding: 1rem 2rem;">Start Free Analysis</a>
      </div>
      <div style="margin-top: 2rem; display: flex; gap: 1.5rem; align-items: center;">
        <div style="display: flex; align-items: center; gap: 0.5rem;">
          <div style="width: 12px; height: 12px; background: var(--green); border-radius: 50%;"></div>
          <span style="font-weight: 600; color: var(--text-secondary);">Real-time</span>
        </div>
        <div style="display: flex; align-items: center; gap: 0.5rem;">
          <div style="width: 12px; height: 12px; background: var(--orange); border-radius: 50%;"></div>
          <span style="font-weight: 600; color: var(--text-secondary);">AI Coaching</span>
        </div>
        <div style="display: flex; align-items: center; gap: 0.5rem;">
          <div style="width: 12px; height: 12px; background: var(--yellow); border-radius: 50%;"></div>
          <span style="font-weight: 600; color: var(--text-secondary);">Pattern Detection</span>
        </div>
      </div>
    </div>
    <div style="flex: 1; display: flex; justify-content: center; position: relative;" class="animate-float">
      <!-- Decorative blobs -->
      <div style="position: absolute; width: 400px; height: 400px; background: rgba(59, 130, 246, 0.2); filter: blur(60px); border-radius: 50%; top: -50px; left: -50px; z-index: -1;"></div>
      <div style="position: absolute; width: 300px; height: 300px; background: rgba(249, 115, 22, 0.2); filter: blur(60px); border-radius: 50%; bottom: -50px; right: 50px; z-index: -1;"></div>
      
      <img src="/assets/hero.png" alt="Healthy Food" style="max-width: 100%; height: auto; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);">
    </div>
  </main>
</body>
</html>
